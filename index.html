<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fancy Social Media Icons</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts (Optional) -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Roboto', sans-serif;
}

/* Icon Container */
.social-icons {
    display: flex;
    gap: 30px;
}

/* Icons */
.social-icons a {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #fff;
    color: #333;
    font-size: 24px;
    text-decoration: none;
    position: relative;
    transition: all 0.4s ease;
    overflow: hidden;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

/* Hover Effect */
.social-icons a:hover {
    transform: scale(1.2) rotate(10deg);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

/* Color effect for different platforms */
.social-icons a.facebook { background: #3b5998; color: #fff; }
.social-icons a.twitter { background: #1da1f2; color: #fff; }
.social-icons a.instagram { background: #e1306c; color: #fff; }
.social-icons a.linkedin { background: #0077b5; color: #fff; }

/* Optional floating circle effect */
.social-icons a::after {
    content: '';
    position: absolute;
    width: 300%;
    height: 300%;
    background: rgba(255,255,255,0.1);
    top: -100%;
    left: -100%;
    border-radius: 50%;
    transition: all 0.5s ease;
}

.social-icons a:hover::after {
    top: -50%;
    left: -50%;
}

</style>

<!-- Font Awesome CDN for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

<div class="social-icons">
    <a href="#" class="facebook"><i class="fab fa-facebook-f"></i></a>
    <a href="#" class="twitter"><i class="fab fa-twitter"></i></a>
    <a href="#" class="instagram"><i class="fab fa-instagram"></i></a>
    <a href="#" class="linkedin"><i class="fab fa-linkedin-in"></i></a>
</div>

</body>
</html>
